name: Build FluxTV APK

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > fluxtv.keystore
          printf "storeFile=../fluxtv.keystore\nstorePassword=zenithtv2026\nkeyAlias=zenithtv\nkeyPassword=zenithtv2026\n" > keystore.properties

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 1

      - name: Get version
        id: ver
        run: echo "VERSION=$(grep versionName app/build.gradle | grep -v '//' | head -1 | sed 's/.*versionName[[:space:]]*"//;s/".*//')" >> $GITHUB_OUTPUT

      - name: Create or update Release
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          APK="app/build/outputs/apk/release/app-release.apk"
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"

          # Borrar release y tag existentes si existen
          RELEASE_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$VERSION" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)

          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/v$VERSION"
            sleep 2
          fi

          # Crear release nuevo
          RELEASE_ID=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"v$VERSION\",\"name\":\"FluxTV v$VERSION\",\"body\":\"\",\"draft\":false,\"prerelease\":false}" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          echo "Release ID: $RELEASE_ID"

          # Subir APK
          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=app-release.apk" \
            --data-binary @$APK | python3 -c "import sys,json; d=json.load(sys.stdin); print('APK URL:', d.get('browser_download_url','error'))"

      - name: Update version endpoint
        run: |
          TOKEN=$(curl -s -X POST http://31.40.212.209:25461/admin/login \
            -H "Content-Type: application/json" \
            -d '{"email":"${{ secrets.API_ADMIN_EMAIL }}","password":"${{ secrets.API_ADMIN_PASS }}"}' | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          curl -s -X PUT http://31.40.212.209:25461/fluxtv/version \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"version":"${{ steps.ver.outputs.VERSION }}","apkUrl":"https://github.com/Maty3388/fluxtv/releases/latest/download/app-release.apk","forceUpdate":false,"changelog":"Nueva versión disponible"}'
