name: Build FluxTV APK

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > fluxtv.keystore
          printf "storeFile=../fluxtv.keystore\nstorePassword=zenithtv2026\nkeyAlias=zenithtv\nkeyPassword=zenithtv2026\n" > keystore.properties

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Get version
        id: ver
        run: echo "VERSION=$(grep versionName app/build.gradle | grep -v '//' | head -1 | sed 's/.*versionName[[:space:]]*"//;s/".*//')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.ver.outputs.VERSION }}
          files: app/build/outputs/apk/release/app-release.apk
          name: FluxTV v${{ steps.ver.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version endpoint
        run: |
          TOKEN=$(curl -s -X POST http://149.104.92.205:25461/admin/login \
            -H "Content-Type: application/json" \
            -d '{"email":"${{ secrets.API_ADMIN_EMAIL }}","password":"${{ secrets.API_ADMIN_PASS }}"}' | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          curl -s -X PUT http://149.104.92.205:25461/fluxtv/version \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"version":"${{ steps.ver.outputs.VERSION }}","apkUrl":"https://github.com/Maty3388/fluxtv/releases/latest/download/app-release.apk","forceUpdate":false,"changelog":""}'
